name: CommitCafe Compile Check

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile CommitCafe.java
        run: |
          echo "Compiling CommitCafe.java on ref: ${{ github.ref_name }}"
          javac CommitCafe.java
          